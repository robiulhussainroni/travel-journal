<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Travel Journal 🌏</title>
    <link rel="stylesheet" href="css/general.css" />
    <link rel="stylesheet" href="css/style.css" />
    <script defer src="js/script.js"></script>
  </head>
  <body>
    <header class="header">
      <h1 class="heading__primary">Travel <span>Journal</span></h1>
    </header>
    <main class="travel">
      <section class="travel__details">
        <form
          action="#"
          class="travel__form"
          title="Press Enter to submit the form"
        >
          <div class="flex">
            <label for="place">Place</label>
            <input type="text" name="place" id="place" placeholder="London" />
          </div>
          <div class="flex">
            <label for="duration">Duration</label>
            <input
              type="text"
              name="duration"
              id="duration"
              placeholder="7 days"
            />
          </div>
          <div class="flex">
            <label for="cost">Cost</label>
            <input type="text" name="cost" id="place" placeholder="Cost" />
          </div>
          <div class="flex">
            <label for="summary">Summary</label>
            <textarea name="summary" id="summary" placeholder="..."></textarea>
          </div>
        </form>
        <ul class="travel__details--list">
          <li class="travel__log flex">
            <h2 class="travel__log--heading">Barcelona</h2>
            <span class="travel__log--date">08 May 2026</span>
          </li>
          <li class="travel__log flex">
            <h2 class="travel__log--heading">Paris</h2>
            <span class="travel__log--date">11 April 2025</span>
          </li>
        </ul>
      </section>
      <section id="map"></section>
    </main>
  </body>
</html>
