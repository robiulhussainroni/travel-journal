<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Travel Journal 🌏</title>
    <link rel="stylesheet" href="css/general.css" />
    <link rel="stylesheet" href="css/style.css" />
    <script defer src="js/script.js"></script>
  </head>
  <body>
    <header class="header">
      <h1 class="heading__primary">Travel <span>Journal</span></h1>
    </header>
    <main class="main">
      <div class="travel__list">
        <form action="#" class="form">
          <input
            type="text"
            name="place__name"
            id="place__name"
            placeholder="Enter place name"
          />
          <input
            type="text"
            name="travel__duration"
            id="travel__duration"
            placeholder="Enter travel duration : eg: 2 days"
          />

          <input
            type="text"
            name="travel__cost"
            id="travel__cost"
            placeholder="Enter travel cost : eg: $100"
          />
          <textarea
            name="short__description"
            id="short__description"
            placeholder="short summary.."
          ></textarea>
        </form>
      </div>
      <div class="travel__map" id="map"></div>
      <div class="travel__details"></div>
    </main>
  </body>
</html>
