<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Travel Journal 🌏</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />

    <link rel="stylesheet" href="css/general.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/responsive.css" />
    <script
      defer
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script defer src="js/script.js"></script>
  </head>
  <body>
    <header class="header">
      <h1 class="heading__primary"><span>T</span>ravel <span>J</span>ournal</h1>
    </header>
    <main class="travel">
      <section class="travel__details">
        <form
          action="#"
          class="travel__form hidden"
          title="Press Enter to submit the form"
        >
          <div class="flex">
            <label for="place">Place</label>
            <input
              type="text"
              name="place"
              id="place"
              placeholder="London"
              required
            />
          </div>
          <div class="flex">
            <label for="duration">Duration</label>
            <input
              type="text"
              name="duration"
              id="duration"
              placeholder="7 days"
              required
            />
          </div>
          <div class="flex">
            <label for="cost">Cost</label>
            <input
              type="text"
              name="cost"
              id="cost"
              placeholder="$32.35"
              required
            />
          </div>
          <div class="flex">
            <label for="summary">Summary</label>
            <textarea
              name="summary"
              id="summary"
              placeholder="..."
              required
            ></textarea>
          </div>
          <button type="submit" class="travel__form--btn">Ok</button>
        </form>
        <ul class="travel__details--list">
          <!-- <li class="travel__log flex">
            <h2 class="travel__log--heading">Barcelona</h2>
            <span class="travel__log--date">08 May 2026</span>
          </li>
          <li class="travel__log flex">
            <h2 class="travel__log--heading">Paris</h2>
            <span class="travel__log--date">11 April 2025</span>
          </li> -->
        </ul>
        <div class="travel__details--modal hidden">
          <!-- <h2 class="travel__modal--heading">Barcelona</h2>
          <div class="flex">
            <span class="travel__modal--date">08 May 2026</span>
            <span class="travel__modal--duration">7 days</span>
            <span class="travel__modal--costs">$980.25</span>
          </div>
          <fieldset class="travel__modal--summary">
            <legend>Summary</legend>
            <p class="summary">
              Lorem ipsum, dolor sit amet consectetur adipisicing elit. In
              temporibus sed ex laborum, voluptas, necessitatibus est enim alias
              laudantium culpa ratione repellat, eius neque sit harum saepe
              dicta. Quae, hic.
            </p>
          </fieldset> -->
        </div>
        <div class="overlay hidden"></div>
        <form action="#" class="location__info hidden">
          <p class="location__info--text">
            We can't get your position..! Please include latitude and longitude
            of the position where you want to open the map..
          </p>
          <label for="location__info--latitude">Latitude : </label>
          <input
            type="text"
            name="latitude"
            id="location__info--latitude"
            placeholder="38.09"
          />
          <label for="location__info--longitude">Longitude : </label>
          <input
            type="text"
            name="longitude"
            id="location__info--longitude"
            placeholder="-14.05"
          />
          <button type="submit" class="hidden">ok</button>
        </form>
      </section>
      <section id="map"></section>
    </main>
  </body>
</html>
